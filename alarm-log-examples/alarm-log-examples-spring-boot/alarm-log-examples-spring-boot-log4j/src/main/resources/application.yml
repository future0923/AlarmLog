spring:
    alarm-log:
        warn:
            mail:
                enabled: false
                smtpHost: xxx
                smtpPort: xxx
                to: xxx
                from: xxx
                username: xxx
                password: xxx
            workweixin:
                enabled: false
                to: xxx,xxx
                applicationId: xxx
                corpid: xxx
                corpsecret: xxx
            dingtalk:
                enabled: false
                token: xxx
                secret: xxx
        exception:
            include:
                extend: false
                classes:
                    - java.lang.Throwable
            exclude:
                extend: false
                classes:
                    - java.io.FileNotFoundException
        simple-warn-info: false
        print-stack-trace: true
        max-retry-times: 1
        retry-sleep-millis: 3000
server:
    port: 8191
